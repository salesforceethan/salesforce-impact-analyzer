<!--
  Flow Monitor Dashboard (MVP shell)
  - SLDS cards for: Top Failures, Slow Flows, Limits Heatmap, Release Regression
  - Filters: Date Range, Flow API Name, Release Tag
  - LDS-first UI; Apex wired later
-->
<template>
  <section class="slds-card slds-m-around_medium">
    <div class="slds-card__header slds-grid slds-grid_align-spread slds-p-around_small">
      <div class="slds-media slds-media_center slds-has-flexi-truncate">
        <div class="slds-media__figure">
          <lightning-icon icon-name="utility:activity" size="small"></lightning-icon>
        </div>
        <div class="slds-media__body">
          <h2 class="slds-card__header-title slds-truncate slds-text-heading_medium">Flow Performance & Reliability Monitor</h2>
          <p class="slds-text-title slds-m-top_xx-small">MVP Dashboard</p>
        </div>
      </div>
      <div class="slds-grid slds-grid_vertical-align-center slds-gutters_small">
        <lightning-input type="date" label="Start Date" value={startDateStr} onchange={handleStartDate}></lightning-input>
        <lightning-input type="date" label="End Date" value={endDateStr} onchange={handleEndDate}></lightning-input>
        <lightning-input type="text" label="Flow API Name" value={flowApiName} onchange={handleFlowApiName}></lightning-input>
        <lightning-input type="text" label="Release Tag" value={releaseTag} onchange={handleReleaseTag}></lightning-input>
        <lightning-button label="Refresh" variant="brand" onclick={handleRefresh} class="slds-m-left_small"></lightning-button>
      </div>
    </div>

    <div class="slds-card__body slds-p-horizontal_small slds-p-bottom_small">
      <div class="slds-grid slds-wrap slds-gutters">
        <!-- Top Failures -->
        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
          <article class="slds-card slds-m-around_x-small">
            <div class="slds-card__header slds-grid">
              <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__figure">
                  <lightning-icon icon-name="utility:error" size="small"></lightning-icon>
                </div>
                <div class="slds-media__body">
                  <h2 class="slds-card__header-title slds-truncate">Top Failing Flows</h2>
                </div>
              </header>
            </div>
            <div class="slds-card__body slds-p-around_small">
              <template if:true={topFailures.length}>
                <ul class="slds-has-dividers_around">
                  <template for:each={topFailures} for:item="item">
                    <li key={item.key} class="slds-item slds-p-vertical_x-small">
                      <div class="slds-grid slds-grid_align-spread">
                        <div>
                          <span class="slds-text-title">{item.flowApiName}</span>
                          <span class="slds-text-body_small slds-m-left_x-small">v{item.version}</span>
                        </div>
                        <div>
                          <span class="slds-badge slds-theme_error slds-m-right_x-small">Fails: {item.failCount}</span>
                          <span class="slds-badge">Rate: {item.failRatePct}%</span>
                        </div>
                      </div>
                    </li>
                  </template>
                </ul>
              </template>
              <template if:false={topFailures.length}>
                <p class="slds-text-color_weak">No failure data in range.</p>
              </template>
            </div>
          </article>
        </div>

        <!-- Slow Flows -->
        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
          <article class="slds-card slds-m-around_x-small">
            <div class="slds-card__header slds-grid">
              <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__figure">
                  <lightning-icon icon-name="utility:clock" size="small"></lightning-icon>
                </div>
                <div class="slds-media__body">
                  <h2 class="slds-card__header-title slds-truncate">Slow Flows (p95)</h2>
                </div>
              </header>
            </div>
            <div class="slds-card__body slds-p-around_small">
              <template if:true={slowFlows.length}>
                <ul class="slds-has-dividers_around">
                  <template for:each={slowFlows} for:item="row">
                    <li key={row.key} class="slds-item slds-p-vertical_x-small">
                      <div class="slds-grid slds-grid_align-spread">
                        <div>
                          <span class="slds-text-title">{row.flowApiName}</span>
                          <span class="slds-text-body_small slds-m-left_x-small">v{row.version}</span>
                        </div>
                        <div>
                          <span class="slds-badge slds-theme_warning slds-m-right_x-small">p95: {row.p95Ms} ms</span>
                          <span class="slds-badge slds-theme_default">avg: {row.avgMs} ms</span>
                        </div>
                      </div>
                    </li>
                  </template>
                </ul>
              </template>
              <template if:false={slowFlows.length}>
                <p class="slds-text-color_weak">No performance data in range.</p>
              </template>
            </div>
          </article>
        </div>

        <!-- Limits Heatmap -->
        <div class="slds-col slds-size_1-of-1">
          <article class="slds-card slds-m-around_x-small">
            <div class="slds-card__header slds-grid">
              <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__figure">
                  <lightning-icon icon-name="utility:warning" size="small"></lightning-icon>
                </div>
                <div class="slds-media__body">
                  <h2 class="slds-card__header-title slds-truncate">Limits Heatmap</h2>
                </div>
              </header>
            </div>
            <div class="slds-card__body slds-p-around_small">
              <div class="slds-grid slds-wrap slds-gutters">
                <template for:each={limitsHeatmap} for:item="lim">
                  <div key={lim.key} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                    <div class="slds-box slds-m-around_x-small">
                      <div class="slds-text-title">{lim.flowApiName} <span class="slds-text-body_small">v{lim.version}</span></div>
                      <div class="slds-m-top_x-small">
                        <span class="slds-badge slds-theme_error slds-m-right_x-small">CPU: {lim.cpuHigh}</span>
                        <span class="slds-badge slds-theme_offline slds-m-right_x-small">SOQL: {lim.soqlHigh}</span>
                        <span class="slds-badge slds-theme_alt-inverse">DML: {lim.dmlHigh}</span>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
              <template if:false={limitsHeatmap.length}>
                <p class="slds-text-color_weak">No limit breaches recorded in range.</p>
              </template>
            </div>
          </article>
        </div>

        <!-- Release Regression -->
        <div class="slds-col slds-size_1-of-1">
          <article class="slds-card slds-m-around_x-small">
            <div class="slds-card__header slds-grid">
              <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__figure">
                  <lightning-icon icon-name="utility:trend" size="small"></lightning-icon>
                </div>
                <div class="slds-media__body">
                  <h2 class="slds-card__header-title slds-truncate">Release Regression Spotlight</h2>
                </div>
              </header>
            </div>
            <div class="slds-card__body slds-p-around_small">
              <template if:true={regressions.length}>
                <ul class="slds-has-dividers_around">
                  <template for:each={regressions} for:item="r">
                    <li key={r.key} class="slds-item slds-p-vertical_x-small">
                      <div class="slds-grid slds-grid_align-spread">
                        <div>
                          <span class="slds-text-title">{r.flowApiName}</span>
                          <span class="slds-text-body_small slds-m-left_x-small">{r.releaseTag}</span>
                        </div>
                        <div>
                          <span class="slds-badge slds-theme_warning slds-m-right_x-small">Δ p95: {r.deltaP95Ms} ms</span>
                          <span class="slds-badge slds-theme_error">Δ FailRate: {r.deltaFailRatePct}%</span>
                        </div>
                      </div>
                    </li>
                  </template>
                </ul>
              </template>
              <template if:false={regressions.length}>
                <p class="slds-text-color_weak">No regressions detected for selected release tag.</p>
              </template>
            </div>
          </article>
        </div>
      </div>
    </div>
  </section>
</template>
